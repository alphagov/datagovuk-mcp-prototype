<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Collection Assistant</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f5f5f5;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        header {
            background: #1d70b8;
            color: white;
            padding: 16px 24px;
            font-size: 18px;
            font-weight: 600;
        }
        #chat {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .message {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 12px;
            line-height: 1.5;
            white-space: pre-wrap;
        }
        .user {
            align-self: flex-end;
            background: #1d70b8;
            color: white;
        }
        .assistant {
            align-self: flex-start;
            background: white;
            border: 1px solid #ddd;
        }
        .typing {
            align-self: flex-start;
            background: white;
            border: 1px solid #ddd;
            padding: 12px 16px;
            border-radius: 12px;
            color: #666;
            font-style: italic;
        }
        #input-area {
            border-top: 1px solid #ddd;
            padding: 16px 24px;
            background: white;
            display: flex;
            gap: 12px;
        }
        #input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
        }
        #input:focus { border-color: #1d70b8; }
        button {
            padding: 12px 24px;
            background: #1d70b8;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }
        button:hover { background: #003078; }
        button:disabled { background: #ccc; cursor: not-allowed; }
    </style>
</head>
<body>
    <header>Data Collection Assistant</header>
    <div id="chat"></div>
    <div id="input-area">
        <input id="input" type="text" placeholder="Ask about UK government data collections..." autocomplete="off">
        <button id="send">Send</button>
    </div>
    <script>
        const chat = document.getElementById('chat');
        const input = document.getElementById('input');
        const sendBtn = document.getElementById('send');

        const ws = new WebSocket(`ws://${location.host}/ws`);

        function addMessage(text, role) {
            const div = document.createElement('div');
            div.className = `message ${role}`;
            div.textContent = text;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
            return div;
        }

        function showTyping() {
            const div = document.createElement('div');
            div.className = 'typing';
            div.id = 'typing';
            div.textContent = 'Thinking...';
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }

        function hideTyping() {
            const el = document.getElementById('typing');
            if (el) el.remove();
        }

        function send() {
            const text = input.value.trim();
            if (!text) return;
            addMessage(text, 'user');
            ws.send(text);
            input.value = '';
            sendBtn.disabled = true;
            showTyping();
        }

        ws.onmessage = (event) => {
            hideTyping();
            addMessage(event.data, 'assistant');
            sendBtn.disabled = false;
        };

        ws.onclose = () => {
            hideTyping();
            addMessage('Connection lost. Please refresh the page.', 'assistant');
        };

        sendBtn.addEventListener('click', send);
        input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') send();
        });
    </script>
</body>
</html>
